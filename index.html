<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Craft Rush</title>
<meta name="theme-color" content="#141218">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #0c0a10; touch-action: none;
    font-family: 'Courier New', Courier, monospace; user-select: none; -webkit-user-select: none; }
  #stage { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    box-shadow: 0 0 60px rgba(0,0,0,0.9); overflow: hidden; }
  #gameCanvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

  .overlay { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; z-index: 10;
    background: rgba(10, 8, 14, 0.55); padding: 20px calc(12px + env(safe-area-inset-left)); }
  .hidden { display: none !important; }

  .panel { background: rgba(22, 19, 28, 0.94); border: 3px solid #000;
    box-shadow: inset 2px 2px 0 rgba(255,255,255,0.12), inset -2px -2px 0 rgba(0,0,0,0.5), 0 8px 30px rgba(0,0,0,0.6);
    padding: 18px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px;
    width: min(340px, 92%); max-height: 94%; overflow-y: auto; }

  .logo { font-size: 34px; font-weight: 900; letter-spacing: 2px; color: #7dff5a; line-height: 1.05;
    text-shadow: 3px 3px 0 #1c4d10, 5px 5px 0 rgba(0,0,0,0.8); text-align: center; }
  .logo small { display: block; font-size: 13px; color: #ffd94d; letter-spacing: 6px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.8); margin-top: 4px; }

  .mcbtn { font-family: inherit; font-weight: 900; font-size: 16px; letter-spacing: 1px;
    color: #fff; text-shadow: 2px 2px 0 rgba(0,0,0,0.6); cursor: pointer;
    background: #6e6e6e; border: 2px solid #000; padding: 12px 18px; width: 100%;
    box-shadow: inset 2px 2px 0 rgba(255,255,255,0.35), inset -3px -4px 0 rgba(0,0,0,0.35); }
  .mcbtn:active { transform: translateY(2px); box-shadow: inset 2px 2px 0 rgba(0,0,0,0.25); }
  .mcbtn.primary { background: #3fae2a; }
  .mcbtn.small { font-size: 13px; padding: 9px 12px; }

  .chipRow { display: flex; gap: 8px; align-items: center; font-weight: 900; color: #fff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.7); font-size: 15px; }
  .chip { background: rgba(0,0,0,0.5); border: 2px solid #000; padding: 5px 10px;
    box-shadow: inset 1px 1px 0 rgba(255,255,255,0.15); }
  .chip.green { color: #7dff7d; }
  .em { display: inline-block; width: 0.95em; height: 0.95em; vertical-align: -0.14em;
    background: var(--em-icon) center/contain no-repeat; image-rendering: pixelated; }

  /* daily expedition card */
  #expCard { width: 100%; border: 2px solid #ffd94d; background: rgba(40,32,10,0.55);
    box-shadow: inset 1px 1px 0 rgba(255,217,77,0.25); padding: 8px; display: flex;
    flex-direction: column; gap: 7px; }
  #expHead { display: flex; justify-content: space-between; align-items: center;
    font-weight: 900; font-size: 12px; letter-spacing: 1px; color: #ffd94d; text-shadow: 1px 1px 0 #000; }
  #expStreak { color: #ff8d3a; }
  #expBody { display: flex; align-items: center; gap: 9px; text-align: left; }
  #expIcon { width: 40px; height: 40px; image-rendering: pixelated; flex: 0 0 auto;
    background: rgba(0,0,0,0.35); border: 1px solid #000; }
  #expName { font-weight: 900; color: #fff; font-size: 14px; text-shadow: 1px 1px 0 #000; }
  #expDesc { font-size: 11px; color: #d8cfa8; line-height: 1.4; }
  #btnExpedition { background: #b58a1a; }

  .modeRow { display: flex; width: 100%; gap: 0; }
  .modeRow .mcbtn { font-size: 13px; padding: 10px 4px; }
  .modeRow .mcbtn.sel { background: #2a7fd4; }
  #modeDesc { font-size: 12px; color: #cfc9d8; text-align: center; line-height: 1.5; min-height: 3em; }

  /* shop */
  #shopGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; }
  .shopSection { grid-column: 1 / -1; font-weight: 900; font-size: 13px; letter-spacing: 2px;
    color: #ffd94d; text-shadow: 2px 2px 0 #000; margin-top: 6px; }
  .skinCard { font-family: inherit; background: #3a3444; border: 2px solid #000; padding: 8px 4px;
    display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;
    box-shadow: inset 2px 2px 0 rgba(255,255,255,0.15), inset -2px -2px 0 rgba(0,0,0,0.4); }
  .skinCard.sel { background: #2a7fd4; }
  .skinCard.locked { opacity: 0.65; }
  .skinCard canvas { width: 64px; height: 88px; image-rendering: pixelated; }
  .skinName { font-weight: 900; color: #fff; font-size: 13px; text-shadow: 1px 1px 0 #000; }
  .skinTag { font-size: 11px; font-weight: 900; color: #7dff7d; text-shadow: 1px 1px 0 #000; }

  /* HUD */
  #hud { position: absolute; inset: 0; z-index: 5; pointer-events: none;
    padding: calc(8px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom)); }
  #hudTop { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  #hudTop .chip { font-size: 13px; }
  #btnPause { font-family: inherit; color: #fff; cursor: pointer; pointer-events: auto;
    font-size: 15px; padding: 4px 12px; box-shadow: inset 1px 1px 0 rgba(255,255,255,0.15); }
  #progressWrap { position: absolute; left: 10px; right: 10px; top: calc(44px + env(safe-area-inset-top));
    height: 8px; background: rgba(0,0,0,0.5); border: 2px solid #000; }
  #hudProgress { height: 100%; width: 0%; background: #7dff5a; }
  #powerChips { position: absolute; left: 0; right: 0; top: calc(62px + env(safe-area-inset-top));
    text-align: center; font-weight: 900; font-size: 13px; color: #ffd94d; text-shadow: 2px 2px 0 #000; }

  #golemBtn { position: absolute; right: 12px; bottom: calc(16px + env(safe-area-inset-bottom));
    width: 74px; height: 74px; border: 3px solid #000; background: #3a3444; pointer-events: auto;
    cursor: pointer; overflow: hidden; box-shadow: inset 2px 2px 0 rgba(255,255,255,0.2), 0 4px 14px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center; flex-direction: column; }
  #golemFill { position: absolute; left: 0; right: 0; bottom: 0; height: 0%; background: #b0332a; }
  #golemBtn.ready #golemFill { background: #e04a3f; }
  #golemBtn.ready { animation: pulse 0.7s infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
  #golemIcon { position: relative; font-size: 26px; text-shadow: 2px 2px 0 #000; }
  #golemLabel { position: relative; font-size: 11px; font-weight: 900; color: #fff; text-shadow: 1px 1px 0 #000; }

  #bossBar { position: absolute; left: 12px; right: 12px; top: calc(78px + env(safe-area-inset-top));
    z-index: 6; pointer-events: none; text-align: center; }
  #bossName { font-weight: 900; font-size: 15px; color: #ff8d7a; text-shadow: 2px 2px 0 #000; letter-spacing: 2px; }
  #bossTrack { height: 12px; background: rgba(0,0,0,0.6); border: 2px solid #000; margin-top: 3px; }
  #bossFill { height: 100%; width: 100%; background: linear-gradient(#ff6d5a, #c02a1c); }
  #bossHint { font-weight: 900; font-size: 12px; color: #ffd94d; text-shadow: 2px 2px 0 #000; margin-top: 3px; }

  /* achievements */
  #achGrid { display: flex; flex-direction: column; gap: 6px; width: 100%; max-height: 62vh; overflow-y: auto; }
  .achRow { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.35);
    border: 2px solid #000; padding: 6px 8px; box-shadow: inset 1px 1px 0 rgba(255,255,255,0.1); }
  .achRow.locked { opacity: 0.45; }
  .achRow.special { border-color: #ffd94d; box-shadow: inset 1px 1px 0 rgba(255,217,77,0.3); }
  .achRow canvas { width: 34px; height: 34px; image-rendering: pixelated; flex: 0 0 auto;
    background: rgba(0,0,0,0.3); border: 1px solid #000; }
  .achText { flex: 1; text-align: left; }
  .achName { font-weight: 900; font-size: 13px; color: #fff; text-shadow: 1px 1px 0 #000; }
  .achRow.special .achName { color: #ffe066; }
  .achDesc { font-size: 11px; color: #b8b2c6; }
  .achMark { font-size: 16px; }

  #achPop { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); z-index: 20;
    display: flex; align-items: center; gap: 10px; pointer-events: none;
    background: #1c1a24; border: 2px solid #ffd94d; padding: 8px 14px 8px 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6), inset 1px 1px 0 rgba(255,255,255,0.12);
    animation: achIn 0.35s ease-out; }
  #achPop.hidden { display: none; }
  #achPopIcon { image-rendering: pixelated; width: 40px; height: 40px; }
  #achPopHead { font-size: 11px; color: #ffd94d; font-weight: 700; letter-spacing: 1px; }
  #achPopName { font-size: 15px; color: #fff; font-weight: 900; text-shadow: 1px 1px 0 #000; }
  @keyframes achIn { from { transform: translate(-50%, -70px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

  #toast { position: absolute; left: 50%; bottom: calc(110px + env(safe-area-inset-bottom));
    transform: translateX(-50%); z-index: 7; background: rgba(0,0,0,0.75); border: 2px solid #000;
    color: #fff; font-weight: 900; font-size: 14px; padding: 10px 14px; text-shadow: 1px 1px 0 #000;
    white-space: nowrap; pointer-events: none; box-shadow: inset 1px 1px 0 rgba(255,255,255,0.2); }

  #resultTitle.win { color: #7dff5a; }
  #resultTitle.lose { color: #ff8d7a; }
  #resultTitle { font-size: 24px; font-weight: 900; text-shadow: 3px 3px 0 rgba(0,0,0,0.8); text-align: center; }
  #resultStats { width: 100%; display: flex; flex-direction: column; gap: 6px; }
  .statRow { display: flex; justify-content: space-between; color: #cfc9d8; font-size: 14px; font-weight: 700;
    background: rgba(0,0,0,0.35); padding: 7px 10px; border: 1px solid #000; }
  .statRow b { color: #fff; }

  #loading { position: absolute; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
    background: #141218; color: #7dff5a; font-weight: 900; font-size: 18px; letter-spacing: 2px; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="gameCanvas"></canvas>

  <div id="hud" class="hidden">
    <div id="hudTop">
      <span class="chip green"><span class="em"></span> <span id="hudEmeralds">0</span></span>
      <button id="btnPause" class="chip">⏸</button>
      <span class="chip" id="hudLevel">LV 1</span>
    </div>
    <div id="progressWrap"><div id="hudProgress"></div></div>
    <div id="powerChips"></div>
    <button id="golemBtn"><div id="golemFill"></div><div id="golemIcon">🗿</div><div id="golemLabel">0%</div></button>
  </div>

  <div id="bossBar" class="hidden">
    <div id="bossName">BOSS</div>
    <div id="bossTrack"><div id="bossFill"></div></div>
    <div id="bossHint"></div>
  </div>

  <div id="toast" class="hidden"></div>

  <div id="achPop" class="hidden">
    <canvas id="achPopIcon" width="40" height="40"></canvas>
    <div>
      <div id="achPopHead">Achievement Get!</div>
      <div id="achPopName">Name</div>
    </div>
  </div>

  <div id="pause" class="overlay hidden">
    <div class="panel">
      <div class="logo" style="font-size:24px">PAUSED</div>
      <button class="mcbtn primary" id="btnResume">▶ RESUME</button>
      <button class="mcbtn small" id="btnPauseCamera">📷 CAMERA: FAR</button>
      <button class="mcbtn small" id="btnPauseShop">🧑 SKINS &amp; SHOP</button>
      <button class="mcbtn small" id="btnPauseAch">🏆 ACHIEVEMENTS</button>
      <button class="mcbtn small" id="btnPauseSound">🔊 SOUND ON</button>
      <button class="mcbtn small" id="btnQuit">🏳 GIVE UP</button>
    </div>
  </div>

  <div id="achievements" class="overlay hidden">
    <div class="panel">
      <div class="chipRow"><span style="color:#fff">🏆 ACHIEVEMENTS</span><span class="chip green" id="achCount">0/0</span></div>
      <div id="achGrid"></div>
      <button class="mcbtn small" id="btnAchBack">◀ BACK</button>
    </div>
  </div>

  <div id="menu" class="overlay hidden">
    <div class="logo">CRAFT<br>RUSH<small>MOB RUNNER</small></div>
    <div class="panel">
      <div class="chipRow">
        <span class="chip" id="menuLevel">LEVEL 1</span>
        <span class="chip green"><span class="em"></span> <span id="menuEmeralds">0</span></span>
      </div>
      <div class="modeRow">
        <button class="mcbtn" id="modeShooter">🏹 BOW BLITZ</button>
        <button class="mcbtn" id="modeGates">🚪 GATE DASH</button>
      </div>
      <div id="modeDesc"></div>
      <button class="mcbtn primary" id="btnPlay">▶ PLAY</button>

      <div id="expCard">
        <div id="expHead">🗺 TODAY'S EXPEDITION<span id="expStreak"></span></div>
        <div id="expBody">
          <canvas id="expIcon" width="40" height="40"></canvas>
          <div class="expText"><div id="expName">—</div><div id="expDesc">—</div></div>
        </div>
        <button class="mcbtn small" id="btnExpedition">▶ START EXPEDITION</button>
      </div>

      <button class="mcbtn" id="btnShop">🧑 SKINS &amp; SHOP</button>
      <button class="mcbtn small" id="btnAch">🏆 ACHIEVEMENTS</button>
      <button class="mcbtn small" id="btnCamera">📷 CAMERA: FAR</button>
      <button class="mcbtn small" id="btnSound">🔊 SOUND ON</button>
    </div>
  </div>

  <div id="shop" class="overlay hidden">
    <div class="panel">
      <div class="chipRow"><span style="color:#fff">PICK YOUR HERO</span><span class="chip green"><span class="em"></span> <span id="shopEmeralds">0</span></span></div>
      <div id="shopGrid"></div>
      <button class="mcbtn small" id="btnShopBack">◀ BACK</button>
    </div>
  </div>

  <div id="result" class="overlay hidden">
    <div class="panel">
      <div id="resultTitle">VICTORY!</div>
      <div id="resultStats"></div>
      <button class="mcbtn primary" id="btnNext">NEXT LEVEL ▶</button>
      <button class="mcbtn primary" id="btnRetry">↻ TRY AGAIN</button>
      <button class="mcbtn small" id="btnMenu">🏠 MENU</button>
    </div>
  </div>

  <div id="loading">LOADING…</div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
